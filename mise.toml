[tools]
rust = "stable"
# Deno's built-in (headless) WebGPU is used to verify the GPU force layout.
deno = "latest"

[tasks.verify-gpu]
description = "Headless WebGPU verification + benchmark of the GPU force layout"
dir = "packages/force-graph"
run = "deno run --unstable-webgpu --allow-read --no-check test/gpu-verify.ts"

[tasks.verify-gpu-oracle]
description = "Assert the GPU sim reproduces d3-force exactly (d3 is the oracle)"
dir = "packages/force-graph"
run = "deno run --unstable-webgpu --allow-read --allow-net --allow-env --no-check test/gpu-oracle.ts"

[tasks.setup-hooks]
description = "Activate the project's git hooks (.hooks/pre-commit)"
run = [
  "git config core.hooksPath .hooks",
  "chmod +x .hooks/pre-commit",
  "echo 'git hooks activated (core.hooksPath = .hooks)'",
]

[tasks.fmt]
description = "Format the dep2 crates"
run = "cargo fmt -p dep2 -p dep2-core -p dep2-plugin -p dep2-plugin-csv -p dep2-plugin-fs -p dep2-plugin-treesitter"

[tasks.check]
description = "Type-check the whole workspace"
run = "cargo check --workspace"

[tasks.verify-gpu-stability]
description = "Assert the GPU sim stays bounded where d3-force does (no explosions)"
dir = "packages/force-graph"
run = "deno run --unstable-webgpu --allow-read --allow-net --allow-env --no-check test/gpu-stability.ts"
